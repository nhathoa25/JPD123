            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {

                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;

        if (window.speechSynthesis) {

        const playAudio = (text, lang) => {
            if (!window.speechSynthesis) {
                console.warn("Trình duyệt không hỗ trợ phát âm.");
                return;
            }

            window.speechSynthesis.cancel();

            let cleanText = text;
            if (lang === 'ja') {
                cleanText = cleanText.replace(/\(~が\)/g, ''); 
                cleanText = cleanText.replace(/~/g, ''); 
                cleanText = cleanText.replace(/\((.*?)\)/g, '$1'); 
                cleanText = cleanText.replace(/\[.*?\]/g, ''); 
                cleanText = cleanText.replace(/A:/g, ''); 
                cleanText = cleanText.replace(/B:/g, ''); 
                cleanText = cleanText.trim();
            }

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = lang === 'ja' ? 'ja-JP' : 'vi-VN';
            utterance.rate = 0.85; 
            utterance.pitch = 1.0;

            if (speechVoices.length === 0) speechVoices = window.speechSynthesis.getVoices();
            
            const targetLang = lang === 'ja' ? 'ja' : 'vi';
            const availableVoices = speechVoices.filter(v => v.lang.includes(targetLang));
            
            if (availableVoices.length > 0) {
                const premiumVoice = availableVoices.find(v => v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Natural'));
                utterance.voice = premiumVoice || availableVoices[0];
            }

            window.speechSynthesis.speak(utterance);
        };

            useEffect(() => {
                setCards(data);

                setIsFlipped(false);

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % cards.length);
                }, 150);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + cards.length) % cards.length);
                }, 150);
            };

            const handleShuffle = () => {
                setIsFlipped(false);
                setTimeout(() => {

            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                generateQuiz(data);
            }, [data, mode]);

            const generateQuiz = (vocabData) => {
                if (vocabData.length < 4) return;
                
                let pool = shuffleArray(vocabData);
                let quizLength = Math.min(pool.length, 20);
                let generatedQuestions = [];

                for (let i = 0; i < quizLength; i++) {
                    const correctWord = pool[i];
                    let wrongOptions = vocabularyData.filter(w => w.id !== correctWord.id);
                    wrongOptions = shuffleArray(wrongOptions).slice(0, 3);
                    
                    let optionsData = [correctWord, ...wrongOptions];
                    optionsData = shuffleArray(optionsData);

                    generatedQuestions.push({
                        correct: correctWord,
                        options: optionsData,
                        questionText: mode === 'ja-vi' ? correctWord.ja : correctWord.vi,
                        correctOptionText: mode === 'ja-vi' ? correctWord.vi : correctWord.ja
                    });
                }
                
                setQuestions(generatedQuestions);
                setCurrentQIndex(0);
                setScore(0);
                setSelectedAnswer(null);
                setIsFinished(false);
            };

            const handleAnswer = (option) => {
                if (selectedAnswer !== null) return;
                
                const currentQ = questions[currentQIndex];
                const selectedText = mode === 'ja-vi' ? option.vi : option.ja;
                const isCorrect = selectedText === currentQ.correctOptionText;
                
                setSelectedAnswer({ text: selectedText, isCorrect });

                if (isCorrect) setScore(score + 1);

                setTimeout(() => {
                    if (currentQIndex + 1 < questions.length) {
                        setCurrentQIndex(currentQIndex + 1);
                        setSelectedAnswer(null);
                    } else {
                        setIsFinished(true);

                return (
                    <div className="text-center p-10 text-orange-600 bg-orange-50 rounded-xl border border-orange-200">
                        Bài học này không đủ từ vựng (cần ít nhất 4 từ) để tạo bộ câu hỏi trắc nghiệm.
                    </div>
                );
            }

            if (isFinished) {
                const percentage = Math.round((score / questions.length) * 100);
                let message = "";
                if (percentage >= 80) message = "Tuyệt vời! Bạn ghi nhớ rất tốt!";
                else if (percentage >= 50) message = "Khá lắm, hãy cố gắng ôn tập thêm chút nữa nhé!";
                else message = "Bạn cần ôn tập nhiều hơn ở bài này nha.";

                return (
                    <div className="text-center py-10 flex flex-col items-center">
                        <div className="w-32 h-32 bg-green-100 rounded-full flex items-center justify-center mb-6 shadow-inner border-4 border-white">
                            <span className="text-4xl font-bold text-green-600">{score}/{questions.length}</span>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">Hoàn thành bài kiểm tra!</h2>
                        <p className="text-gray-600 mb-8 font-medium">{message}</p>
                        <button 
                            onClick={() => generateQuiz(data)}
                            className="px-8 py-3 bg-green-600 text-white rounded-full font-bold shadow hover:bg-green-700 hover:-translate-y-1 transition transform"
                        >
                            Làm lại bài
                        </button>
                    </div>
                );
            }

            if (questions.length === 0) return null;

            const currentQ = questions[currentQIndex];

            return (
                <div className="max-w-3xl mx-auto py-4">
                    <div className="mb-6 flex items-center justify-between">
                        <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Câu {currentQIndex + 1} / {questions.length}</span>
                        <span className="text-sm font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-100">Điểm: {score}</span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-2.5 mb-8 overflow-hidden">
                        <div className="bg-green-500 h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${((currentQIndex + 1) / questions.length) * 100}%` }}></div>
                    </div>

                    <div className="text-center mb-10 relative">
                        <h3 className="text-xs text-gray-400 mb-3 uppercase tracking-widest font-bold">Câu hỏi</h3>
                        <div className="py-10 px-6 bg-blue-50/50 rounded-2xl border border-blue-100 shadow-sm flex flex-col items-center justify-center gap-6 relative">
                            
                            <button 
                                onClick={() => playAudio(currentQ.questionText, mode === 'ja-vi' ? 'ja' : 'vi')}
                                className="absolute top-4 right-4 p-3 text-blue-600 bg-white hover:bg-blue-100 hover:scale-110 rounded-full shadow transition"
                                title="Nghe câu hỏi"
                            >
                                <SpeakerIcon className="w-6 h-6"/>
                            </button>

                            <div className={`text-2xl md:text-4xl font-bold ${mode === 'ja-vi' ? 'text-blue-900' : 'text-gray-800'} leading-tight px-4`}>
                                {currentQ.questionText}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {currentQ.options.map((opt, idx) => {
                            const optionText = mode === 'ja-vi' ? opt.vi : opt.ja;
                            let buttonClass = "p-5 text-lg font-medium border-2 rounded-xl transition-all duration-200 text-center flex items-center justify-center min-h-[90px] shadow-sm ";
                            
                            if (selectedAnswer === null) {
                                buttonClass += "border-gray-200 bg-white hover:border-green-400 hover:bg-green-50 hover:-translate-y-1 hover:shadow text-gray-700 cursor-pointer";
                            } else {
                                if (optionText === currentQ.correctOptionText) {
                                    buttonClass += "border-green-500 bg-green-100 text-green-900 scale-[1.02] shadow-md z-10";
                                } else if (selectedAnswer.text === optionText && !selectedAnswer.isCorrect) {
                                    buttonClass += "border-red-400 bg-red-50 text-red-800";
                                } else {
                                    buttonClass += "border-gray-200 bg-gray-50 text-gray-400 opacity-60";
                                }
                            }

                            return (
                                <button 
                                    key={idx}
                                    disabled={selectedAnswer !== null}
                                    onClick={() => handleAnswer(opt)}
                                    className={buttonClass}
                                >
                                    {optionText}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
