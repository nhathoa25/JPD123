<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語への旅 | Hành Trình Chinh Phục Tiếng Nhật</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow:hidden;background:#050816;color:#fff}
#space{position:fixed;inset:0;z-index:-3}
#loader{position:fixed;inset:0;background:#050816;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999}
#loader h1{font-size:2.5rem}
.progress{width:320px;height:14px;background:#222;border-radius:99px;margin:20px 0;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,#ff69b4,#7f5af0,#00f5d4);animation:load 3s forwards}
@keyframes load{to{width:100%}}
.cursor{width:18px;height:18px;border-radius:50%;position:fixed;background:#fff;pointer-events:none;z-index:99999;box-shadow:0 0 20px #fff,0 0 40px #ff69b4}
.trail{position:fixed;width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none;animation:fade .8s forwards}
@keyframes fade{to{opacity:0;transform:scale(0)}}
.toggle{position:fixed;right:20px;top:20px;border:none;border-radius:50%;width:60px;height:60px;font-size:1.4rem;cursor:pointer;z-index:1000}
.container{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.title{text-align:center;text-shadow:0 0 10px #fff,0 0 30px #ff69b4,0 0 60px #7f5af0}
.jp{font-size:4rem;font-weight:700}
.vn{font-size:2rem}
.slogan{margin:20px 0 50px;text-align:center;font-size:1.1rem;color:#e5e7eb}
.cards{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
.card{
width:320px;height:230px;text-decoration:none;color:#fff;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:28px;
display:flex;flex-direction:column;justify-content:center;align-items:center;
transition:.4s;position:relative;overflow:hidden
}
.card:before{
content:"";position:absolute;left:-120%;top:0;width:70%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
transform:skewX(-25deg)
}
.card:hover:before{left:180%;transition:1s}
.card:hover{transform:translateY(-12px) rotateX(8deg) rotateY(8deg);box-shadow:0 0 30px #fff,0 0 60px #ff69b4}
.icon{font-size:4rem;margin-bottom:15px}
.card h2{margin-bottom:10px}
.sakura{position:fixed;top:-50px;font-size:22px;pointer-events:none;animation:fall linear infinite}
@keyframes fall{
from{transform:translateY(-50px) rotate(0)}
to{transform:translateY(110vh) translateX(120px) rotate(720deg)}
}
.dark{background:#000}
.dark .card{background:rgba(20,20,30,.6)}
@media(max-width:768px){
.jp{font-size:2.3rem}.vn{font-size:1.3rem}
}
</style>
</head>
<body>

<div id="loader">
<h1>🌸 日本語への旅 🌸</h1>
<div class="progress"><div class="bar"></div></div>
<p>Đang chuẩn bị hành trình học tập...</p>
</div>

<canvas id="space"></canvas>
<div class="cursor"></div>

<button class="toggle">🌙</button>

<div class="container">
<div class="title">
<div class="jp">日本語への旅</div>
<div class="vn">HÀNH TRÌNH CHINH PHỤC TIẾNG NHẬT</div>
</div>

<div class="slogan">
Khám phá ngôn ngữ • Chạm tới văn hóa • Mở rộng tương lai
</div>

<div class="cards">
<a href="./tuvung/index.html" class="card">
<div class="icon">📚</div>
<h2>TỪ VỰNG</h2>
<p>Flashcard • Kanji • Từ mới</p>
</a>

<a href="./ontap45/index.html" class="card">
<div class="icon">📝</div>
<h2>ÔN TẬP 4 & 5</h2>
<p>Luyện tập và kiểm tra</p>
</a>

<a href="./kanji/index.html" class="card">
<div class="icon">📝</div>
<h2>Học Kanji</h2>
<p>Củng cố kiến thức nâng cao</p>
</a>
</div>
</div>

<script>
window.addEventListener("load",()=>{
setTimeout(()=>document.getElementById("loader").style.display="none",3000);
});

const canvas=document.getElementById("space"),ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener("resize",resize);
let stars=[...Array(250)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+0.2,v:Math.random()*0.4+0.1}));
(function anim(){
ctx.fillStyle="#050816";ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();s.y+=s.v;if(s.y>canvas.height)s.y=0;});
requestAnimationFrame(anim);
})();

for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="sakura";p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(8+Math.random()*8)+"s";
p.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(p);
}

const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
let t=document.createElement("div");
t.className="trail";
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),800);
});

document.querySelector(".toggle").onclick=()=>{
document.body.classList.toggle("dark");
};

const hoverAudio=new Audio("assets/hover.mp3");
const clickAudio=new Audio("assets/click.mp3");

document.querySelectorAll(".card").forEach(c=>{
c.addEventListener("mouseenter",()=>{try{hoverAudio.currentTime=0;hoverAudio.play()}catch(e){}});
c.addEventListener("click",()=>{try{clickAudio.currentTime=0;clickAudio.play()}catch(e){}});
});
</script>
</body>
</html>
