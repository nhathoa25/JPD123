        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #eef2ff 50%, #e0f7fa 100%);
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.5);
        }

        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hover-lift:hover:not(:disabled) {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.25);
        }
        .btn-press {
            transition: transform 0.1s ease, filter 0.1s ease;
        }
        .btn-press:active:not(:disabled) {
            transform: scale(0.95);
            filter: brightness(0.9);
        }
        .floating-icon {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(3deg); }
            50% { transform: translateY(-15px) rotate(-3deg); }
            100% { transform: translateY(0px) rotate(3deg); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pulse-glow {
            animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); }
        }

        .option-btn {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-correct {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            color: #065f46 !important;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.25);
        }
        .option-wrong {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #991b1b !important;
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .option-disabled {
            opacity: 0.5;
            filter: grayscale(0.8);
            cursor: not-allowed;
            transform: scale(0.98);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function getRandomWrongOptions(correctOption, dataArray, key, count = 3) {
    let wrongOptions = [];
    let attempts = 0;
    while(wrongOptions.length < count && attempts < 100) {
        let randomItem = dataArray[Math.floor(Math.random() * dataArray.length)][key];
        if(randomItem !== correctOption && !wrongOptions.includes(randomItem)) {
            wrongOptions.push(randomItem);
        }
        attempts++;
    }
    return wrongOptions;
}

function generateQuestionBank() {
    let generated = [];
    
    // --- 1. KANJI (Giảm xuống đúng 4 biến thể) ---
    kanjiData.forEach(item => {
        // Biến thể 1: Kanji -> Hiragana
        let hOpts = shuffleArray([item.h, ...getRandomWrongOptions(item.h, kanjiData, 'h', 3)]);
        generated.push({ type: 'Kanji', q: `Chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> có phiên âm Hiragana là gì?`, opts: hOpts, ans: item.h, exp: `<strong>${item.k} (${item.h})</strong> nghĩa là: ${item.m}.`, tts: item.k});

        // Biến thể 2: Kanji -> Nghĩa
        let mOpts = shuffleArray([item.m, ...getRandomWrongOptions(item.m, kanjiData, 'm', 3)]);
        generated.push({ type: 'Kanji', q: `Nghĩa của chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> là gì?`, opts: mOpts, ans: item.m, exp: `<strong>${item.k} (${item.h})</strong> nghĩa là: ${item.m}.`, tts: item.k});

        // Biến thể 3: Nghĩa -> Kanji
        let kOpts = shuffleArray([item.k, ...getRandomWrongOptions(item.k, kanjiData, 'k', 3)]);
        generated.push({ type: 'Kanji', q: `Từ nào có nghĩa là <strong>'${item.m}'</strong>?`, opts: kOpts, ans: item.k, exp: `<strong>${item.m}</strong> viết Hán tự là: ${item.k} (${item.h}).`, tts: item.h});

        // Biến thể 4: Hiragana -> Kanji
        let kOpts2 = shuffleArray([item.k, ...getRandomWrongOptions(item.k, kanjiData, 'k', 3)]);
        generated.push({ type: 'Kanji', q: `Từ có âm đọc <strong class="text-indigo-600 text-[120%]">'${item.h}'</strong> viết Kanji là gì?`, opts: kOpts2, ans: item.k, exp: `Chữ <strong>${item.k}</strong> đọc là ${item.h}.`, tts: item.h});
    });

    // --- 2. VOCAB (2 biến thể) ---
    vocabData.forEach(item => {
        // Biến thể 1: Hiragana -> Nghĩa
        let mOpts = shuffleArray([item.m, ...getRandomWrongOptions(item.m, vocabData, 'm', 3)]);
        generated.push({ type: 'Từ vựng', q: `Từ <strong class="text-pink-600 text-[120%]">'${item.h}'</strong> có nghĩa là gì?`, opts: mOpts, ans: item.m, exp: `<strong>${item.h}</strong> nghĩa là: ${item.m}.`, tts: item.h});

        // Biến thể 2: Nghĩa -> Hiragana
        let hOpts = shuffleArray([item.h, ...getRandomWrongOptions(item.h, vocabData, 'h', 3)]);
        generated.push({ type: 'Từ vựng', q: `Từ nào sau đây có nghĩa là <strong>'${item.m}'</strong>?`, opts: hOpts, ans: item.h, exp: `<strong>${item.m}</strong> tiếng Nhật là: ${item.h}.`, tts: ''});
    });

    // --- 3. GRAMMAR ---
    grammarData.forEach(item => {
        generated.push({ type: 'Ngữ pháp', q: item.q, opts: shuffleArray(item.opts), ans: item.ans, exp: item.exp, tts: '' });
    });

    return generated;
}

window.handleCustomInput = function(val) {

    if (num > totalBankSize) num = totalBankSize;
    totalConfigured = num;
    updateNumButtons(num);
}

function updateNumButtons(num) {
    const buttons = document.querySelectorAll('#numSelectGrid button');
    buttons.forEach(btn => {
        const btnVal = btn.getAttribute('data-val');
        if(btnVal == num || (btnVal === 'all' && num === totalBankSize)) {
            btn.className = "py-3 rounded-2xl text-sm font-black border-2 border-indigo-500 bg-indigo-50 text-indigo-700 btn-press option-btn transform scale-105 shadow-md";
        } else {
            btn.className = "py-3 rounded-2xl text-sm font-black border border-gray-200 text-gray-500 btn-press option-btn hover:bg-gray-50 hover:border-gray-300";
        }
    });
}

function startQuiz() {

    if(num < 1) num = 10;

    let pG = [...poolGrammar];
    let pK = [...poolKanji];
    let pV = [...poolVocab];
    
    let selected = [];
    let turn = 0; // 0: Grammar, 1: Kanji, 2: Vocab

    // Thuật toán bốc xoay vòng cân bằng
    while(selected.length < totalConfigured) {
        if (pG.length === 0 && pK.length === 0 && pV.length === 0) break; // Hết kho

        if (turn === 0) {
            if (pG.length > 0) selected.push(pG.pop());
            turn = 1;
        } else if (turn === 1) {
            if (pK.length > 0) selected.push(pK.pop());
            turn = 2;
        } else if (turn === 2) {
            if (pV.length > 0) selected.push(pV.pop());
            turn = 0;
        }
    }

    currentQuestions = selected; // Không shuffle ở đây nữa để thấy rõ nhịp Grammar -> Kanji -> Vocab
    currentIndex = 0;
    userAnswers = new Array(totalConfigured).fill(null);
    stats = { correct: 0, incorrect: 0, skipped: 0 };
    renderQuizScreen();
}

window.renderQuestionBankScreen = function() {
    let listHTML = allGeneratedQuestions.map((q, idx) => {
        let badgeColor = q.type === 'Ngữ pháp' ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 
                         (q.type === 'Kanji' ? 'bg-pink-100 text-pink-700 border-pink-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200');
        
        return `
        <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_4px_15px_rgba(0,0,0,0.02)] mb-4 hover:shadow-md transition-shadow">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-gray-800 text-white text-xs font-black px-3 py-1 rounded-full shadow-sm">Câu ${idx + 1}</span>
                <span class="${badgeColor} text-[10px] font-black px-3 py-1 rounded-full border shadow-sm uppercase tracking-wider">${q.type}</span>
            </div>
            <h3 class="font-extrabold text-gray-800 text-lg mb-4 leading-relaxed">${q.q}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                ${q.opts.map(opt => `
                    <div class="p-3 rounded-xl text-sm border-2 font-bold ${opt === q.ans ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-gray-50 border-gray-100 text-gray-500'} flex justify-between items-center">
                        ${opt}
                        ${opt === q.ans ? '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>' : ''}
                    </div>
                `).join('')}
            </div>
            <div class="bg-indigo-50/70 p-4 rounded-xl border border-indigo-100 text-sm text-indigo-900 font-bold">
                <i class="fa-solid fa-lightbulb text-yellow-500 mr-2 text-lg"></i> ${q.exp}
            </div>
        </div>
    `}).join('');

    appDiv.innerHTML = `
        ${getHeaderHTML()}
        <div class="p-6 md:p-10 bg-white/40 animate-fade-in-up">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                <div>
                    <h2 class="text-2xl md:text-3xl font-black text-gray-800 flex items-center gap-3">
                        <span class="w-12 h-12 rounded-[1rem] bg-gradient-to-tr from-indigo-100 to-white shadow-sm border border-white text-indigo-500 flex items-center justify-center">
                            <i class="fa-solid fa-database text-xl"></i>
                        </span>
                        Thư Viện Câu Hỏi
                    </h2>
                    <p class="text-gray-500 mt-2 font-bold text-sm">Danh sách toàn bộ ${totalBankSize} câu hỏi được sinh tự động.</p>
                </div>
                <button onclick="renderStartScreen()" class="bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 font-black py-3 px-8 rounded-2xl shadow-sm transition-all btn-press hover-lift flex items-center gap-3">
                    <i class="fa-solid fa-arrow-left"></i> Trở về
                </button>
            </div>
            
            <div class="max-h-[60vh] overflow-y-auto pr-3 scroll-smooth">
                ${listHTML}
            </div>
        </div>
    `;
}

function renderQuizScreen() {
    const q = currentQuestions[currentIndex];
    const isAnswered = userAnswers[currentIndex] !== null;
    let selectedIdx = isAnswered ? userAnswers[currentIndex].selectedIdx : -1;
    
    let answeredCount = stats.correct + stats.incorrect;
    let winRate = answeredCount > 0 ? Math.round((stats.correct / answeredCount) * 100) : 0;
    const alphabet = ['A', 'B', 'C', 'D'];

    let optionsHTML = q.opts.map((opt, idx) => {
        let btnClass = "bg-white border-2 border-gray-100 text-gray-700 hover-lift hover:border-indigo-300";
        let iconHtml = `<span class="w-8 h-8 rounded-xl bg-gray-100 flex items-center justify-center text-sm font-black text-gray-400 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors">${alphabet[idx]}</span>`;
        
        if (isAnswered) {
            if (opt === q.ans) {
                btnClass = "option-correct font-extrabold";
                iconHtml = `<span class="w-8 h-8 rounded-xl bg-emerald-100 flex items-center justify-center text-sm font-black text-emerald-600 shadow-inner"><i class="fa-solid fa-check"></i></span>`;
            } else if (idx === selectedIdx && opt !== q.ans) {
                btnClass = "option-wrong";
                iconHtml = `<span class="w-8 h-8 rounded-xl bg-red-100 flex items-center justify-center text-sm font-black text-red-600 shadow-inner"><i class="fa-solid fa-xmark"></i></span>`;
            } else {
                btnClass = "bg-gray-50 border-2 border-gray-100 text-gray-400 option-disabled";
            }
        }

        return `
            <button ${isAnswered ? 'disabled' : `onclick="selectAnswer(${idx})"`} 
                class="option-btn btn-press w-full flex items-center justify-between p-4 md:p-5 rounded-2xl font-bold text-left text-lg ${btnClass} group">
                <span class="mr-4 ml-2 leading-relaxed">${opt}</span>
                ${iconHtml}
            </button>
        `;
    }).join('');

    let explanationHTML = '';
    if (isAnswered) {
        let statusColor = userAnswers[currentIndex].isCorrect ? 'text-emerald-600' : (userAnswers[currentIndex].selectedIdx === -1 ? 'text-yellow-600' : 'text-red-600');
        let statusIcon = userAnswers[currentIndex].isCorrect ? 'fa-check-circle' : (userAnswers[currentIndex].selectedIdx === -1 ? 'fa-minus-circle' : 'fa-xmark-circle');
        let statusText = userAnswers[currentIndex].isCorrect ? 'Chính xác!' : (userAnswers[currentIndex].selectedIdx === -1 ? 'Đã bỏ qua' : 'Sai rồi!');

        explanationHTML = `
            <div class="mt-6 p-6 rounded-[1.5rem] bg-indigo-50/90 border border-indigo-100 animate-fade-in-up shadow-sm">
                <h4 class="font-black ${statusColor} flex items-center gap-2 mb-3 text-lg">
                    <i class="fa-solid ${statusIcon}"></i> ${statusText}
                </h4>
                <p class="text-indigo-900 leading-relaxed font-bold">
                    ${q.exp}
                </p>
            </div>
        `;
    }

    // Đổi màu Label theo Dạng câu hỏi
    let catColor = q.type === 'Ngữ pháp' ? 'text-indigo-500' : (q.type === 'Kanji' ? 'text-pink-500' : 'text-emerald-500');

    appDiv.innerHTML = `
        ${getHeaderHTML()}
        
        <div class="px-6 md:px-10 py-8 bg-white/30 animate-fade-in-up">
            <!-- Header Stats -->
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <div class="flex items-center gap-3">
                    <span class="bg-white px-5 py-2.5 rounded-xl font-black text-indigo-700 shadow-sm border border-gray-100 text-sm">
                        CÂU ${currentIndex + 1}/${totalConfigured}
                    </span>
                    <span class="bg-white px-5 py-2.5 rounded-xl font-black text-gray-600 shadow-sm border border-gray-100 text-sm flex items-center gap-4">
                        <span class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div> ${stats.correct}</span>
                        <span class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.8)]"></div> ${stats.incorrect}</span>
                    </span>
                </div>
                
                <div class="flex items-center gap-3">
                    <span class="bg-indigo-50 px-5 py-2.5 rounded-xl font-black text-indigo-700 border border-indigo-100 text-sm shadow-sm">
                        Tỉ lệ: ${winRate}%
                    </span>
                    <button onclick="endQuiz()" class="bg-white px-5 py-2.5 rounded-xl font-black text-gray-500 shadow-sm border border-gray-100 hover:bg-red-50 hover:text-red-500 hover:border-red-200 text-sm flex items-center gap-2 transition-all btn-press">
                        <i class="fa-solid fa-power-off"></i> Dừng lại
                    </button>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-gray-200/80 rounded-full h-2 mb-8 overflow-hidden shadow-inner">
                <div class="bg-gradient-to-r from-indigo-400 to-pink-500 h-2 rounded-full transition-all duration-500 ease-out relative" style="width: ${((currentIndex) / totalConfigured) * 100}%">
                    <div class="absolute inset-0 bg-white/30 w-full animate-pulse"></div>
                </div>
            </div>

            <!-- Question Card -->
            <div class="text-center mb-8 relative">
                <span class="text-[11px] font-black ${catColor} tracking-widest uppercase mb-4 block flex justify-center items-center gap-2">
                    <i class="fa-solid fa-hashtag text-gray-300"></i> Dạng: ${q.type}
                </span>
                
                <div class="bg-white p-8 md:p-14 rounded-[2rem] shadow-lg border border-gray-50 relative min-h-[180px] flex items-center justify-center transform transition-transform hover:scale-[1.01] duration-300">
                    <h2 class="text-2xl md:text-3xl font-black text-gray-800 leading-relaxed">
                        ${q.q}
                    </h2>
                    ${q.tts ? `
                    <button onclick="playTTS('${q.tts}')" class="absolute right-6 md:right-10 top-1/2 -translate-y-1/2 w-14 h-14 bg-indigo-50 rounded-[1rem] flex items-center justify-center text-indigo-500 hover:bg-indigo-500 hover:text-white transition-all transform hover:scale-110 active:scale-95 shadow-sm hover:shadow-[0_10px_20px_-10px_rgba(99,102,241,0.5)]">
                        <i class="fa-solid fa-volume-high text-2xl"></i>
                    </button>
                    ` : ''}
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${optionsHTML}
            </div>

            ${explanationHTML}

            <!-- Bottom Nav -->
            <div class="mt-10 flex flex-col-reverse sm:flex-row sm:items-center justify-between gap-4">
                <button onclick="prevQuestion()" class="w-full sm:w-auto flex items-center justify-center gap-3 font-black px-8 py-4 rounded-2xl transition-all btn-press ${currentIndex === 0 ? 'text-gray-300 cursor-not-allowed bg-transparent' : 'text-gray-500 hover:bg-white hover:shadow-sm hover:text-indigo-600 border border-transparent hover:border-gray-200'}" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fa-solid fa-arrow-left"></i> Câu trước
                </button>
                
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    ${!isAnswered ? `
                        <button onclick="skipQuestion()" class="flex-1 sm:flex-none font-black px-10 py-4 rounded-2xl text-yellow-600 border-2 border-yellow-200 hover:bg-yellow-50 transition-all btn-press hover-lift flex items-center justify-center gap-2">
                            Bỏ qua <i class="fa-solid fa-forward-step"></i>
                        </button>
                    ` : ''}
                    
                    <button onclick="nextQuestion()" class="flex-1 sm:flex-none btn-press hover-lift ${isAnswered ? 'bg-indigo-600 hover:bg-indigo-700 shadow-[0_8px_25px_-6px_rgba(79,70,229,0.7)] animate-pulse-glow' : 'bg-gray-200 text-gray-400 cursor-not-allowed'} text-white font-black px-10 py-4 rounded-2xl transition-all flex items-center justify-center gap-3" ${!isAnswered ? 'disabled' : ''}>
                        ${currentIndex === totalConfigured - 1 ? 'Hoàn thành' : 'Kế tiếp'} <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
}

window.selectAnswer = function(idx) {
    if (userAnswers[currentIndex] !== null) return; 

    const q = currentQuestions[currentIndex];
    const isCorrect = q.opts[idx] === q.ans;
    
    userAnswers[currentIndex] = { selectedIdx: idx, isCorrect: isCorrect };
    if (isCorrect) stats.correct++;
    else stats.incorrect++;

    renderQuizScreen(); 
}

window.skipQuestion = function() {
    userAnswers[currentIndex] = { selectedIdx: -1, isCorrect: false };
    stats.skipped++;
    renderQuizScreen();
}

window.nextQuestion = function() {
    if (currentIndex < totalConfigured - 1) {
        currentIndex++;
        renderQuizScreen();
    } else {
        endQuiz();
    }
}

window.prevQuestion = function() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuizScreen();
    }
}

window.playTTS = function(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
    } else {
        console.warn("Trình duyệt không hỗ trợ phát âm (Web Speech API).");
    }
}

window.endQuiz = function() {
    let c = 0, ic = 0, sk = 0;
    userAnswers.forEach(ans => {
        if (ans) {
            if (ans.isCorrect) c++;
            else if (ans.selectedIdx === -1) sk++;
            else ic++;
        } else {
            sk++; 
        }
    });

    let accuracy = (c + ic) > 0 ? Math.round((c / (c + ic)) * 100) : 0;
    let title = accuracy >= 80 ? "Hoàn Thành Tuyệt Vời!" : (accuracy >= 50 ? "Hoàn Thành Khá Tốt!" : "Hoàn Thành Tuyệt Vời!");
    let sub = accuracy >= 80 ? "Kiến thức của bạn rất vững. Hãy tiếp tục duy trì nhé!" : "Cần luyện tập thêm! Hãy chú ý đọc kỹ giải thích bên dưới nhé.";
    
    let reviewHTML = currentQuestions.map((q, idx) => {
        let ansData = userAnswers[idx];
        if(!ansData) return ''; 

        let statusText = '', statusColor = '';
        if (ansData.isCorrect) { statusText = 'ĐÚNG'; statusColor = 'bg-emerald-100 text-emerald-700 border-emerald-200'; }
        else if (ansData.selectedIdx === -1) { statusText = 'BỎ QUA'; statusColor = 'bg-yellow-100 text-yellow-700 border-yellow-200'; }
        else { statusText = 'SAI'; statusColor = 'bg-red-100 text-red-700 border-red-200'; }

        return `
            <div class="bg-white rounded-2xl p-6 border border-gray-100 mb-5 text-left shadow-sm hover:shadow-md transition-shadow">
                <div class="flex gap-4 mb-4 items-start">
                    <span class="${statusColor} border text-[10px] font-black px-2 py-1.5 rounded-lg mt-1 whitespace-nowrap shadow-sm tracking-wider">${statusText}</span>
                    <h3 class="font-black text-gray-800 text-lg leading-relaxed">${q.q}</h3>
                </div>
                <div class="pl-16">
                    <p class="text-sm text-gray-500 mb-1 font-bold">Bạn chọn: <strong>${ansData.selectedIdx !== -1 ? q.opts[ansData.selectedIdx] : 'Không chọn'}</strong></p>
                    ${!ansData.isCorrect ? `<p class="text-sm text-emerald-600 mb-3 font-bold">Đáp án đúng: <strong class="bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100 shadow-sm">${q.ans}</strong></p>` : ''}
                    <div class="text-sm bg-indigo-50/70 p-5 rounded-xl border border-indigo-100 text-indigo-900 font-bold mt-2">
                        <i class="fa-solid fa-lightbulb text-yellow-500 mr-2 text-lg"></i> ${q.exp}
                    </div>
                </div>
            </div>
        `;
    }).join('');

    appDiv.innerHTML = `
        ${getHeaderHTML()}
        <div class="p-8 md:p-14 text-center bg-white/50 animate-fade-in-up">
            <div class="text-7xl mb-8 floating-icon drop-shadow-md text-indigo-400">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2 class="text-4xl font-black text-gray-800 mb-3 tracking-tight">${title}</h2>
            <p class="text-pink-500 font-black mb-12 text-lg">${sub}</p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                <div class="bg-white border border-indigo-100 rounded-[2rem] p-8 shadow-[0_10px_25px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-5xl font-black text-indigo-600 mb-3">${accuracy}<span class="text-2xl text-indigo-400">%</span></div>
                    <div class="text-[11px] font-black text-indigo-400 uppercase tracking-widest">ĐỘ CHÍNH XÁC</div>
                </div>
                <div class="bg-emerald-50 border border-emerald-100 rounded-[2rem] p-8 shadow-[0_10px_25px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-5xl font-black text-emerald-500 mb-3">${c}</div>
                    <div class="text-[11px] font-black text-emerald-400 uppercase tracking-widest">SỐ CÂU ĐÚNG</div>
                </div>
                <div class="bg-red-50 border border-red-100 rounded-[2rem] p-8 shadow-[0_10px_25px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-5xl font-black text-red-500 mb-3">${ic}</div>
                    <div class="text-[11px] font-black text-red-400 uppercase tracking-widest">SỐ CÂU SAI</div>
                </div>
                <div class="bg-yellow-50 border border-yellow-100 rounded-[2rem] p-8 shadow-[0_10px_25px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-5xl font-black text-yellow-600 mb-3">${sk}</div>
                    <div class="text-[11px] font-black text-yellow-500 uppercase tracking-widest">BỎ QUA</div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-5 mb-12">
                <button onclick="renderStartScreen()" class="w-full sm:w-64 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-black py-4 px-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-1 btn-press flex justify-center items-center gap-3">
                    <i class="fa-solid fa-rotate-right text-xl"></i> Thử sức lại
                </button>
                <button onclick="renderStartScreen()" class="w-full sm:w-64 bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 font-black py-4 px-8 rounded-2xl shadow-sm transition-all btn-press hover-lift flex justify-center items-center gap-3">
                    <i class="fa-solid fa-house text-xl"></i> Trang chủ
                </button>
            </div>

            ${c + ic + sk > 0 ? `
            <div class="mt-14 border-t-2 border-gray-100 pt-12">
                <h3 class="text-2xl font-black text-gray-800 mb-8 flex items-center justify-center gap-4">
                    <span class="w-12 h-12 rounded-[1rem] bg-indigo-100 text-indigo-500 flex items-center justify-center shadow-inner"><i class="fa-solid fa-list-check text-xl"></i></span>
                    Xem lại chi tiết đáp án
                </h3>
                <div class="max-h-[600px] overflow-y-auto pr-4 scroll-smooth">
                    ${reviewHTML}
                </div>
            </div>
            ` : ''}
        </div>
    `;
}

// Bắt đầu ứng dụng
renderStartScreen();
</script>
</body>
</html>
