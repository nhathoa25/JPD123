    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fde4f2 0%, #eef2ff 50%, #e0f2fe 100%);
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        /* --- ANIMATIONS & HOVER EFFECTS --- */
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        .hover-lift:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.3);
        }
        .btn-press {
            transition: transform 0.1s ease;
        }
        .btn-press:active:not(:disabled) {
            transform: scale(0.96);
        }
        .floating-icon {
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(3deg); }
            50% { transform: translateY(-12px) rotate(-3deg); }
            100% { transform: translateY(0px) rotate(3deg); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pulse-glow {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
        }

        /* --- OPTION STATES --- */
        .option-btn {
            transition: all 0.25s ease;
        }
        .option-correct {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            color: #065f46;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
        }
        .option-wrong {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #991b1b;
        }
        .option-disabled {
            opacity: 0.6;
            filter: grayscale(0.5);
            cursor: not-allowed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>

// Hai hàm tiện ích trộn mảng & lấy đáp án sai
function shuffleArray(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getRandomWrongOptions(correctOption, dataArray, key, count = 3) {
    let wrongOptions = [];
    let attempts = 0;
    while(wrongOptions.length < count && attempts < 100) {
        let randomItem = dataArray[Math.floor(Math.random() * dataArray.length)][key];
        if(randomItem !== correctOption && !wrongOptions.includes(randomItem)) {
            wrongOptions.push(randomItem);
        }
        attempts++;
    }
    return wrongOptions;
}

function generateQuestionBank() {
    let generated = [];
    
    // 1. KANJI (Đúng 4 biến thể / từ) -> 44 * 4 = 176 câu
    kanjiData.forEach(item => {
        let hOpts = shuffleArray([item.h, ...getRandomWrongOptions(item.h, kanjiData, 'h', 3)]);
        generated.push({
            type: 'kanji',
            q: `Chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> có phiên âm Hiragana là gì?`,
            opts: hOpts, ans: item.h, 
            exp: `<strong>${item.k} (${item.h})</strong> nghĩa là: ${item.m}.`, tts: item.k
        });

        let mOpts = shuffleArray([item.m, ...getRandomWrongOptions(item.m, kanjiData, 'm', 3)]);
        generated.push({
            type: 'kanji',
            q: `Nghĩa của chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> là gì?`,
            opts: mOpts, ans: item.m, 
            exp: `<strong>${item.k} (${item.h})</strong> nghĩa là: ${item.m}.`, tts: item.k
        });

        let kOpts1 = shuffleArray([item.k, ...getRandomWrongOptions(item.k, kanjiData, 'k', 3)]);
        generated.push({
            type: 'kanji',
            q: `Từ nào có nghĩa là <strong>'${item.m}'</strong>?`,
            opts: kOpts1, ans: item.k, 
            exp: `<strong>${item.m}</strong> trong tiếng Nhật là: ${item.k} (${item.h}).`, tts: ''
        });

        let kOpts2 = shuffleArray([item.k, ...getRandomWrongOptions(item.k, kanjiData, 'k', 3)]);
        generated.push({
            type: 'kanji',
            q: `Từ <strong>'${item.h}'</strong> được viết bằng chữ Hán nào?`,
            opts: kOpts2, ans: item.k, 
            exp: `<strong>${item.h}</strong> viết chữ Hán là: ${item.k} (Nghĩa: ${item.m}).`, tts: item.h
        });
    });

    // 2. TỪ VỰNG KANA (2 biến thể / từ) -> ~112 * 2 = 224 câu
    vocabData.forEach(item => {
        let mOpts = shuffleArray([item.m, ...getRandomWrongOptions(item.m, vocabData, 'm', 3)]);
        generated.push({
            type: 'vocab',
            q: `Từ <strong class="text-indigo-600 text-[120%]">'${item.h}'</strong> có nghĩa là gì?`,
            opts: mOpts, ans: item.m, 
            exp: `<strong>${item.h}</strong> nghĩa là: ${item.m}.`, tts: item.h
        });

        let hOpts = shuffleArray([item.h, ...getRandomWrongOptions(item.h, vocabData, 'h', 3)]);
        generated.push({
            type: 'vocab',
            q: `Từ nào sau đây có nghĩa là <strong>'${item.m}'</strong>?`,
            opts: hOpts, ans: item.h, 
            exp: `<strong>${item.m}</strong> dịch sang tiếng Nhật là: ${item.h}.`, tts: ''
        });
    });

    // 3. NGỮ PHÁP BIÊN SOẠN (Explicit) -> 35 câu
    explicitGrammarData.forEach(item => {
        generated.push({
            type: 'grammar',
            q: item.q, opts: item.opts, ans: item.ans, exp: item.exp, tts: ''
        });
    });

    // 4. TỰ ĐỘNG SINH NGỮ PHÁP (Tính từ chuẩn hóa Khẳng định/Phủ định/Quá khứ) -> 8 * 4 = 32 câu
    const iAdjs = [
        {w: 'おおきい', p: 'おおきくないです', qk: 'おおきかったです', qp: 'おおきくなかったです', m: 'To, lớn'},
        {w: 'ちいさい', p: 'ちいさくないです', qk: 'ちいさかったです', qp: 'ちいさくなかったです', m: 'Nhỏ, bé'},
        {w: 'たかい', p: 'たかくないです', qk: 'たかかったです', qp: 'たかくなかったです', m: 'Cao, đắt'},
        {w: 'いい', p: 'よくないです', qk: 'よかったです', qp: 'よくなかったです', m: 'Tốt, hay'}
    ];
    
    const naAdjs = [
        {w: 'しずか', p: 'しずかじゃありません', qk: 'しずかでした', qp: 'しずかじゃありませんでした', m: 'Yên tĩnh'},
        {w: 'にぎやか', p: 'にぎやかじゃありません', qk: 'にぎやかでした', qp: 'にぎやかじゃありませんでした', m: 'Náo nhiệt'},
        {w: 'ゆうめい', p: 'ゆうめいじゃありません', qk: 'ゆうめいでした', qp: 'ゆうめいじゃありませんでした', m: 'Nổi tiếng'},
        {w: 'かんたん', p: 'かんたんじゃありません', qk: 'かんたんでした', qp: 'かんたんじゃありませんでした', m: 'Đơn giản'}
    ];
    
    naAdjs.forEach(adj => {
        generated.push({
            type: 'grammar',
            q: `この まちは _____。 (Phủ định của ${adj.w} - ${adj.m})`,
            opts: [adj.p, `${adj.w}なくないです`, `${adj.w}でした`, `${adj.w}じゃないです`],
            ans: adj.p,
            exp: `${adj.w} là tính từ đuôi な. Phủ định ở hiện tại là 'じゃありません'. Nghĩa: Khu phố này không ${adj.m.toLowerCase()}.`, tts: ''
        });
        generated.push({
            type: 'grammar',
            q: `きのうの パーティーは _____。 (Quá khứ khẳng định của ${adj.w} - ${adj.m})`,
            opts: [adj.qk, `${adj.w}かったです`, `${adj.w}だ`, `${adj.w}じゃありません`],
            ans: adj.qk,
            exp: `${adj.w} là tính từ đuôi な. Quá khứ là 'でした'. Nghĩa: Bữa tiệc hôm qua đã ${adj.m.toLowerCase()}.`, tts: ''
        });
        generated.push({
            type: 'grammar',
            q: `きのうは _____。 (Quá khứ phủ định của ${adj.w} - ${adj.m})`,
            opts: [adj.qp, `${adj.w}じゃないです`, `${adj.w}ませんでした`, `${adj.w}くなかったです`],
            ans: adj.qp,
            exp: `${adj.w} là tính từ đuôi な. Quá khứ phủ định CHỈ DÙNG cấu trúc chuẩn 'じゃありませんでした'. Nghĩa: Hôm qua đã không ${adj.m.toLowerCase()}.`, tts: ''
        });
    });

    iAdjs.forEach(adj => {
        generated.push({
            type: 'grammar',
            q: `あの くるまは _____。 (Phủ định của ${adj.w} - ${adj.m})`,
            opts: [adj.p, `${adj.w}じゃないです`, `${adj.w}でした`, `${adj.w.slice(0, -1)}くありません`],
            ans: adj.p,
            exp: `${adj.w} là tính từ đuôi い. Phủ định dùng '${adj.p}' (TUYỆT ĐỐI không dùng くありません). Nghĩa: Ô tô kia không ${adj.m.toLowerCase()}.`, tts: ''
        });
        generated.push({
            type: 'grammar',
            q: `きのうの えいがは _____。 (Quá khứ khẳng định của ${adj.w} - ${adj.m})`,
            opts: [adj.qk, `${adj.w}でした`, `${adj.w}だ`, `${adj.w}くなかったです`],
            ans: adj.qk,
            exp: `${adj.w} là tính từ đuôi い. Quá khứ là '${adj.qk}'. Nghĩa: Phim hôm qua đã ${adj.m.toLowerCase()}.`, tts: ''
        });
        generated.push({
            type: 'grammar',
            q: `きのうの テストは _____。 (Quá khứ phủ định của ${adj.w} - ${adj.m})`,
            opts: [adj.qp, `${adj.w}じゃありませんでした`, `${adj.qp.replace('なかった', 'ないでした')}`, `${adj.w}かったです`],
            ans: adj.qp,
            exp: `${adj.w} là tính từ đuôi い. Quá khứ phủ định dùng '${adj.qp}'. Nghĩa: Bài kiểm tra hôm qua đã không ${adj.m.toLowerCase()}.`, tts: ''
        });
    });

    return generated;
}

// Thuật toán Round-Robin: Trộn đều Ngữ pháp -> Kanji -> Từ vựng
function getBalancedQuestions(total) {
    let kBank = shuffleArray(questionBank.filter(q => q.type === 'kanji'));
    let vBank = shuffleArray(questionBank.filter(q => q.type === 'vocab'));
    let gBank = shuffleArray(questionBank.filter(q => q.type === 'grammar'));
    
    let result = [];
    let i = 0;
    while(result.length < total) {
        if(gBank.length > i && result.length < total) result.push(gBank[i]);
        if(kBank.length > i && result.length < total) result.push(kBank[i]);
        if(vBank.length > i && result.length < total) result.push(vBank[i]);
        i++;
        if(i >= Math.max(kBank.length, vBank.length, gBank.length)) break;
    }
    return result;
}

                </div>
            </div>

            <button onclick="startQuiz()" class="mt-8 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-4 px-12 rounded-2xl hover:shadow-[0_15px_30px_-5px_rgba(99,102,241,0.4)] transition-all transform hover:-translate-y-1 w-full max-w-md text-lg btn-press flex items-center justify-center gap-2">
                Khởi hành ngay <i class="fa-solid fa-rocket"></i>
            </button>
        </div>
    `;
    updateNumButtons(totalConfigured);
}

window.selectNumQ = function(num) {
    totalConfigured = num;
    document.getElementById('customNumInput').value = num;
    updateNumButtons(num);
}

window.handleCustomInput = function(val) {
    let num = parseInt(val);
    if (isNaN(num) || num < 1) num = 1;
    if (num > questionBank.length) num = questionBank.length;
    totalConfigured = num;
    updateNumButtons(num);
}

function updateNumButtons(num) {
    const buttons = document.querySelectorAll('#numSelectGrid button');
    buttons.forEach(btn => {
        const btnVal = btn.getAttribute('data-val');
        if(btnVal == num || (btnVal === 'all' && num === questionBank.length)) {
            btn.className = "py-2 rounded-xl text-xs sm:text-sm font-semibold border-2 border-indigo-500 bg-indigo-50 text-indigo-700 btn-press option-btn transform scale-105 shadow-sm";
        } else {
            btn.className = "py-2 rounded-xl text-xs sm:text-sm font-semibold border border-gray-200 hover:border-indigo-400 text-gray-600 btn-press option-btn hover:bg-indigo-50 hover:text-indigo-600";
        }
    });
}

function startQuiz() {
    let num = parseInt(document.getElementById('customNumInput').value) || totalConfigured;
    if(num < 1) num = 10;
    if(num > questionBank.length) num = questionBank.length;
    totalConfigured = num;

    currentQuestions = getBalancedQuestions(totalConfigured);
    currentIndex = 0;
    userAnswers = new Array(totalConfigured).fill(null);
    stats = { correct: 0, incorrect: 0, skipped: 0 };
    renderQuizScreen();
}

// --- SCREEN 2: LÀM BÀI ---
function renderQuizScreen() {
    const q = currentQuestions[currentIndex];
    const isAnswered = userAnswers[currentIndex] !== null;
    let selectedIdx = isAnswered ? userAnswers[currentIndex].selectedIdx : -1;
    
    let answeredCount = stats.correct + stats.incorrect;
    let winRate = answeredCount > 0 ? Math.round((stats.correct / answeredCount) * 100) : 0;

    const alphabet = ['A', 'B', 'C', 'D'];

    let optionsHTML = q.opts.map((opt, idx) => {
        let btnClass = "bg-white border-2 border-gray-100 text-gray-700 hover-lift hover:border-indigo-300";
        let iconHtml = `<span class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors">${alphabet[idx]}</span>`;
        
        if (isAnswered) {
            if (opt === q.ans) {
                btnClass = "option-correct font-extrabold";
                iconHtml = `<span class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center text-sm font-bold text-emerald-600 shadow-inner"><i class="fa-solid fa-check"></i></span>`;
            } else if (idx === selectedIdx && opt !== q.ans) {
                btnClass = "option-wrong";
                iconHtml = `<span class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center text-sm font-bold text-red-600 shadow-inner"><i class="fa-solid fa-xmark"></i></span>`;
            } else {
                btnClass = "bg-gray-50 border-2 border-gray-100 text-gray-400 option-disabled";
            }
        }

        return `
            <button ${isAnswered ? 'disabled' : `onclick="selectAnswer(${idx})"`} 
                class="option-btn btn-press w-full flex items-center justify-between p-4 md:p-5 rounded-2xl font-bold text-left text-base sm:text-lg ${btnClass} group">
                <span class="mr-4 ml-2">${opt}</span>
                ${iconHtml}
            </button>
        `;
    }).join('');

    let explanationHTML = '';
    if (isAnswered) {
        let statusColor = userAnswers[currentIndex].isCorrect ? 'text-emerald-600' : (userAnswers[currentIndex].selectedIdx === -1 ? 'text-yellow-600' : 'text-red-600');
        let statusIcon = userAnswers[currentIndex].isCorrect ? 'fa-check-circle' : (userAnswers[currentIndex].selectedIdx === -1 ? 'fa-minus-circle' : 'fa-xmark-circle');
        let statusText = userAnswers[currentIndex].isCorrect ? 'Chính xác!' : (userAnswers[currentIndex].selectedIdx === -1 ? 'Đã bỏ qua' : 'Sai rồi!');

        explanationHTML = `
            <div class="mt-6 p-5 rounded-2xl bg-indigo-50/90 border border-indigo-100 animate-fade-in-up shadow-sm">
                <h4 class="font-bold ${statusColor} flex items-center gap-2 mb-2 text-lg">
                    <i class="fa-solid ${statusIcon}"></i> ${statusText}
                </h4>
                <p class="text-indigo-900 leading-relaxed font-medium">
                    ${q.exp}
                </p>
            </div>
        `;
    }

    appDiv.innerHTML = `
        ${getHeaderHTML()}
        
        <div class="px-8 py-6 bg-white/30 animate-fade-in-up flex-1 flex flex-col">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <div class="flex items-center gap-3">
                    <span class="bg-white px-3 sm:px-4 py-2 rounded-xl font-extrabold text-indigo-700 shadow-sm border border-gray-100 text-xs sm:text-sm">
                        CÂU ${currentIndex + 1}/${totalConfigured}
                    </span>
                    <span class="bg-white px-3 sm:px-4 py-2 rounded-xl font-bold text-gray-600 shadow-sm border border-gray-100 text-xs sm:text-sm flex items-center gap-3">
                        <span class="flex items-center gap-1"><div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div> ${stats.correct}</span>
                        <span class="flex items-center gap-1"><div class="w-2.5 h-2.5 rounded-full bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.8)]"></div> ${stats.incorrect}</span>
                    </span>
                </div>
                
                <div class="flex items-center gap-2 sm:gap-3">
                    <span class="bg-indigo-50 px-3 sm:px-4 py-2 rounded-xl font-bold text-indigo-700 border border-indigo-100 text-xs sm:text-sm shadow-sm hidden sm:inline-block">
                        Tỉ lệ: ${winRate}%
                    </span>
                    <button onclick="endQuiz()" class="bg-white px-3 sm:px-4 py-2 rounded-xl font-bold text-gray-600 shadow-sm border border-gray-100 hover:bg-red-50 hover:text-red-500 hover:border-red-200 text-xs sm:text-sm flex items-center gap-2 transition-all btn-press">
                        <i class="fa-solid fa-power-off"></i> <span class="hidden sm:inline">Kết thúc</span>
                    </button>
                </div>
            </div>

            <div class="w-full bg-gray-200 rounded-full h-2 mb-8 overflow-hidden shadow-inner flex-shrink-0">
                <div class="bg-gradient-to-r from-indigo-400 to-purple-500 h-2 rounded-full transition-all duration-500 ease-out relative" style="width: ${((currentIndex) / totalConfigured) * 100}%">
                    <div class="absolute inset-0 bg-white/30 w-full animate-pulse"></div>
                </div>
            </div>

            <div class="text-center mb-8 relative flex-shrink-0">
                <span class="text-[10px] sm:text-xs font-bold text-indigo-400 tracking-widest uppercase mb-4 block">NỘI DUNG CÂU HỎI (${q.type === 'grammar' ? 'NGỮ PHÁP' : (q.type === 'kanji' ? 'KANJI' : 'TỪ VỰNG')})</span>
                
                <div class="bg-white p-8 md:p-12 rounded-3xl shadow-lg border border-gray-50 relative min-h-[140px] flex items-center justify-center transform transition-transform hover:scale-[1.01] duration-300">
                    <h2 class="text-xl sm:text-2xl md:text-3xl font-extrabold text-gray-800 leading-relaxed pr-10">
                        ${q.q}
                    </h2>
                    ${q.tts ? `
                    <button onclick="playTTS('${q.tts}')" title="Nghe phát âm" class="absolute right-4 sm:right-6 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 hover:bg-indigo-500 hover:text-white transition-all transform hover:scale-110 active:scale-95 shadow-sm hover:shadow-indigo-300">
                        <i class="fa-solid fa-volume-high text-lg sm:text-xl"></i>
                    </button>
                    ` : ''}
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-shrink-0">
                ${optionsHTML}
            </div>

            ${explanationHTML}

            <div class="mt-auto pt-8 flex items-center justify-between">
                <button onclick="prevQuestion()" class="flex items-center gap-2 font-bold px-4 sm:px-6 py-3 rounded-xl transition-all btn-press text-sm sm:text-base ${currentIndex === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-white hover:shadow-sm hover:text-indigo-600'}" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Câu trước</span>
                </button>
                
                <div class="flex items-center gap-2 sm:gap-3">
                    ${!isAnswered ? `
                        <button onclick="skipQuestion()" class="font-bold px-5 sm:px-8 py-3 rounded-xl text-yellow-600 border-2 border-yellow-200 hover:bg-yellow-50 transition-all btn-press hover-lift flex items-center gap-2 text-sm sm:text-base">
                            Bỏ qua <i class="fa-solid fa-forward-step"></i>
                        </button>
                    ` : ''}
                    
                    <button onclick="nextQuestion()" class="btn-press hover-lift ${isAnswered ? 'bg-indigo-600 hover:bg-indigo-700 shadow-[0_8px_20px_-6px_rgba(79,70,229,0.6)] animate-pulse-glow' : 'bg-gray-200 text-gray-400 cursor-not-allowed'} text-white font-bold px-5 sm:px-8 py-3 rounded-xl transition-all flex items-center gap-2 text-sm sm:text-base" ${!isAnswered ? 'disabled' : ''}>
                        ${currentIndex === totalConfigured - 1 ? 'Hoàn thành' : 'Kế tiếp'} <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
}

window.selectAnswer = function(idx) {
    if (userAnswers[currentIndex] !== null) return; 
    const q = currentQuestions[currentIndex];
    const isCorrect = q.opts[idx] === q.ans;
    
    userAnswers[currentIndex] = { selectedIdx: idx, isCorrect: isCorrect };
    if (isCorrect) stats.correct++;
    else stats.incorrect++;

    renderQuizScreen(); 
}

window.skipQuestion = function() {
    userAnswers[currentIndex] = { selectedIdx: -1, isCorrect: false };
    stats.skipped++;
    renderQuizScreen();
}

window.nextQuestion = function() {
    if (currentIndex < totalConfigured - 1) {
        currentIndex++;
        renderQuizScreen();
    } else {
        endQuiz();
    }
}

window.prevQuestion = function() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuizScreen();
    }
}

window.playTTS = function(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
    } else {
        console.log("Trình duyệt không hỗ trợ Text-to-Speech");
    }
}

// --- SCREEN 3: KẾT QUẢ ---
window.endQuiz = function() {
    let c = 0, ic = 0, sk = 0;
    userAnswers.forEach(ans => {
        if (ans) {
            if (ans.isCorrect) c++;
            else if (ans.selectedIdx === -1) sk++;
            else ic++;
        } else {
            sk++; 
        }
    });

    let accuracy = (c + ic) > 0 ? Math.round((c / (c + ic)) * 100) : 0;
    let title = accuracy >= 80 ? "Hoàn Thành Tuyệt Vời!" : (accuracy >= 50 ? "Hoàn Thành Khá Tốt!" : "Hoàn Thành Tuyệt Vời!");
    let sub = accuracy >= 80 ? "Kiến thức của bạn rất vững. Hãy tiếp tục duy trì nhé!" : "Cần luyện tập thêm! Hãy làm lại nhiều lần để quen mặt chữ và ngữ pháp nhé.";
    
    let reviewHTML = currentQuestions.map((q, idx) => {
        let ansData = userAnswers[idx];
        if(!ansData) return ''; 

        let statusText = '', statusColor = '';
        if (ansData.isCorrect) { statusText = 'ĐÚNG'; statusColor = 'bg-emerald-100 text-emerald-700 border-emerald-200'; }
        else if (ansData.selectedIdx === -1) { statusText = 'BỎ QUA'; statusColor = 'bg-yellow-100 text-yellow-700 border-yellow-200'; }
        else { statusText = 'SAI'; statusColor = 'bg-red-100 text-red-700 border-red-200'; }

        return `
            <div class="bg-white rounded-xl p-5 border border-gray-100 mb-4 text-left shadow-sm hover:shadow-md transition-shadow">
                <div class="flex gap-3 mb-3 items-start">
                    <span class="${statusColor} border text-[10px] font-extrabold px-2 py-1 rounded mt-1 whitespace-nowrap">${statusText}</span>
                    <h3 class="font-bold text-gray-800 text-base sm:text-lg">${q.q}</h3>
                </div>
                <div class="pl-12 sm:pl-14">
                    <p class="text-xs sm:text-sm text-gray-500 mb-1">Đáp án của bạn: <strong>${ansData.selectedIdx !== -1 ? q.opts[ansData.selectedIdx] : 'Không chọn'}</strong></p>
                    ${!ansData.isCorrect ? `<p class="text-xs sm:text-sm text-emerald-600 mb-3">Đáp án đúng: <strong class="bg-emerald-50 px-2 py-0.5 rounded">${q.ans}</strong></p>` : ''}
                    <div class="text-xs sm:text-sm bg-indigo-50/50 p-3 sm:p-4 rounded-xl border border-indigo-100 text-indigo-900 font-medium">
                        <i class="fa-solid fa-lightbulb text-yellow-500 mr-2 text-base sm:text-lg"></i> ${q.exp}
                    </div>
                </div>
            </div>
        `;
    }).join('');

    appDiv.innerHTML = `
        ${getHeaderHTML()}
        <div class="p-8 md:p-12 text-center bg-white/40 animate-fade-in-up flex-1">
            <div class="text-7xl mb-6 floating-icon drop-shadow-md text-blue-400">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">${title}</h2>
            <p class="text-pink-500 font-bold mb-10 text-sm sm:text-lg">${sub}</p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white border border-indigo-100 rounded-2xl p-4 sm:p-6 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-3xl sm:text-4xl font-black text-indigo-600 mb-2">${accuracy}<span class="text-xl sm:text-2xl text-indigo-400">%</span></div>
                    <div class="text-[9px] sm:text-[10px] font-bold text-indigo-400 uppercase tracking-widest">ĐỘ CHÍNH XÁC</div>
                </div>
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 sm:p-6 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-3xl sm:text-4xl font-black text-emerald-500 mb-2">${c}</div>
                    <div class="text-[9px] sm:text-[10px] font-bold text-emerald-400 uppercase tracking-widest">SỐ CÂU ĐÚNG</div>
                </div>
                <div class="bg-red-50 border border-red-100 rounded-2xl p-4 sm:p-6 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-3xl sm:text-4xl font-black text-red-500 mb-2">${ic}</div>
                    <div class="text-[9px] sm:text-[10px] font-bold text-red-400 uppercase tracking-widest">SỐ CÂU SAI</div>
                </div>
                <div class="bg-yellow-50 border border-yellow-100 rounded-2xl p-4 sm:p-6 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.05)] hover:-translate-y-1 transition-transform">
                    <div class="text-3xl sm:text-4xl font-black text-yellow-600 mb-2">${sk}</div>
                    <div class="text-[9px] sm:text-[10px] font-bold text-yellow-500 uppercase tracking-widest">BỎ QUA</div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-4 mb-10">
                <button onclick="renderStartScreen()" class="w-full sm:w-48 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 btn-press">
                    <i class="fa-solid fa-rotate-right mr-2"></i> Thử sức lại
                </button>
                <button onclick="renderStartScreen()" class="w-full sm:w-48 bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 font-bold py-4 px-6 rounded-2xl shadow-sm transition-all btn-press hover-lift">
                    <i class="fa-solid fa-house mr-2"></i> Trang chủ
                </button>
            </div>

            ${c + ic + sk > 0 ? `
            <div class="mt-12 border-t border-gray-200 pt-10">
                <h3 class="text-lg sm:text-xl font-extrabold text-gray-800 mb-6 flex items-center justify-center gap-3">
                    <span class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center"><i class="fa-solid fa-list-check"></i></span>
                    Xem lại chi tiết đáp án
                </h3>
                <div class="max-h-[500px] overflow-y-auto pr-3 scroll-smooth text-left">
                    ${reviewHTML}
                </div>
            </div>
            ` : ''}
        </div>
    `;
}

// --- SCREEN 4: THƯ VIỆN TOÀN BỘ CÂU HỎI ---
window.renderLibraryScreen = function() {
    let allHTML = questionBank.map((q, idx) => {
        let typeLabel = q.type === 'grammar' ? '<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[10px] font-bold">NGỮ PHÁP</span>' : 
                        (q.type === 'kanji' ? '<span class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded text-[10px] font-bold">KANJI</span>' : 
                        '<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-bold">TỪ VỰNG</span>');
        
        return `
            <div class="bg-white rounded-xl p-5 border border-gray-100 mb-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex gap-3 mb-2 items-start">
                    <span class="bg-gray-100 text-gray-600 font-bold px-2 py-1 rounded mt-1 text-xs whitespace-nowrap">#${idx + 1}</span>
                    <div class="flex-1">
                        ${typeLabel}
                        <h3 class="font-bold text-gray-800 text-base sm:text-lg mt-1">${q.q}</h3>
                    </div>
                </div>
                <div class="pl-12 sm:pl-14">
                    <p class="text-xs sm:text-sm text-emerald-600 mb-3">Đáp án chuẩn: <strong class="bg-emerald-50 px-2 py-0.5 rounded">${q.ans}</strong></p>
                    <div class="text-xs sm:text-sm bg-indigo-50/50 p-3 sm:p-4 rounded-xl border border-indigo-100 text-indigo-900 font-medium">
                        <i class="fa-solid fa-book text-indigo-500 mr-2"></i> ${q.exp}
                    </div>
                </div>
            </div>
        `;
    }).join('');

    appDiv.innerHTML = `
        <div class="px-8 pt-8 pb-4 border-b border-gray-100 bg-white/80 sticky top-0 z-10 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-800">Thư Viện Ngân Hàng Đề</h1>
                <p class="text-gray-500 text-sm font-medium mt-1">Tổng cộng: ${questionBank.length} câu hỏi độc quyền</p>
            </div>
            <button onclick="renderStartScreen()" class="bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 font-bold px-4 py-2 rounded-xl shadow-sm transition flex items-center gap-2">
                <i class="fa-solid fa-xmark"></i> Đóng
            </button>
        </div>
        <div class="p-4 sm:p-8 flex-1 overflow-y-auto bg-gray-50/50">
            ${allHTML}
        </div>
    `;
}

// KHỞI ĐỘNG ỨNG DỤNG
renderStartScreen();
</script>
</body>
</html>
