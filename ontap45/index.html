/** =========================================================================
 * 2. THUẬT TOÁN SINH CÂU HỎI ĐA CHIỀU (SIÊU ĐA DẠNG)
 * ========================================================================= */
function getUniqueOptions(correctVal, dataArray, key, count = 3) {
    let wrongOptions = new Set();
    let attempts = 0;
    while(wrongOptions.size < count && attempts < 200) {
        let randomItem = dataArray[Math.floor(Math.random() * dataArray.length)];
        let val = key ? randomItem[key] : randomItem;
        if(val !== correctVal && val !== '') wrongOptions.add(val);
        attempts++;
    }
    return Array.from(wrongOptions);
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generateQuestionBank() {
    let kQs = [], vQs = [], gQs = [];
    
    // --- KANJI: Sinh 6 loại biến thể ---
    kanjiData.forEach(item => {
        kQs.push({ category: 'Kanji', q: `Chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> có âm đọc Hiragana là gì?`, opts: shuffleArray([item.h, ...getUniqueOptions(item.h, kanjiData, 'h', 3)]), ans: item.h, exp: `<strong>${item.k} (${item.h})</strong>: ${item.m}.`, tts: item.k });
        kQs.push({ category: 'Kanji', q: `Nghĩa của chữ Hán <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> là gì?`, opts: shuffleArray([item.m, ...getUniqueOptions(item.m, kanjiData, 'm', 3)]), ans: item.m, exp: `<strong>${item.k} (${item.h})</strong>: ${item.m}.`, tts: item.k });
        kQs.push({ category: 'Kanji', q: `Từ nào có nghĩa là <strong>'${item.m}'</strong>?`, opts: shuffleArray([item.k, ...getUniqueOptions(item.k, kanjiData, 'k', 3)]), ans: item.k, exp: `<strong>${item.m}</strong> là chữ: ${item.k} (${item.h}).`, tts: item.h });
        kQs.push({ category: 'Kanji', q: `Cách đọc <strong class="text-indigo-600 text-[120%]">'${item.h}'</strong> là của chữ Hán nào?`, opts: shuffleArray([item.k, ...getUniqueOptions(item.k, kanjiData, 'k', 3)]), ans: item.k, exp: `Chữ <strong>${item.k}</strong> đọc là ${item.h}.`, tts: item.h });
        kQs.push({ category: 'Kanji', q: `Từ <strong class="text-indigo-600 text-[120%]">'${item.h}'</strong> có nghĩa là gì?`, opts: shuffleArray([item.m, ...getUniqueOptions(item.m, kanjiData, 'm', 3)]), ans: item.m, exp: `<strong>${item.k} (${item.h})</strong>: ${item.m}.`, tts: item.h });
    });

    // --- VOCAB: Sinh 2-4 loại biến thể ---
    vocabData.forEach(item => {
        let displayWord = item.k !== item.h ? item.k : item.h;
        vQs.push({ category: 'Từ vựng', q: `Từ <strong class="text-indigo-600 text-[120%]">'${displayWord}'</strong> có nghĩa là gì?`, opts: shuffleArray([item.m, ...getUniqueOptions(item.m, vocabData, 'm', 3)]), ans: item.m, exp: `<strong>${displayWord} ${item.k !== item.h ? `(${item.h})` : ''}</strong>: ${item.m}.`, tts: displayWord });
        vQs.push({ category: 'Từ vựng', q: `Từ nào sau đây có nghĩa là <strong>'${item.m}'</strong>?`, opts: shuffleArray([displayWord, ...getUniqueOptions(displayWord, vocabData, 'k', 3)]), ans: displayWord, exp: `<strong>${item.m}</strong> dịch là: ${displayWord} ${item.k !== item.h ? `(${item.h})` : ''}.`, tts: '' });
        
        // Nếu từ có Kanji (k khác h)
        if (item.k !== item.h) {
            vQs.push({ category: 'Từ vựng', q: `Cách đọc của chữ <strong class="text-indigo-600 text-[120%]">'${item.k}'</strong> là gì?`, opts: shuffleArray([item.h, ...getUniqueOptions(item.h, vocabData, 'h', 3)]), ans: item.h, exp: `<strong>${item.k}</strong> đọc là ${item.h}.`, tts: item.k });
            vQs.push({ category: 'Từ vựng', q: `Từ <strong class="text-indigo-600 text-[120%]">'${item.h}'</strong> viết bằng Kanji là chữ nào?`, opts: shuffleArray([item.k, ...getUniqueOptions(item.k, vocabData, 'k', 3)]), ans: item.k, exp: `<strong>${item.h}</strong> viết Kanji là: ${item.k} (${item.m}).`, tts: item.h });
        }
    });

    // --- GRAMMAR ---
    grammarData.forEach(item => {
        gQs.push({ category: 'Ngữ pháp', q: item.q, opts: item.opts, ans: item.ans, exp: item.exp, tts: '' });
    });

    return { kQs, vQs, gQs };
}

// Logic cho bộ đếm số lượng
window.selectNumQ = function(num) {
    totalConfigured = num;
    document.getElementById('customNumInput').value = num;
    updateNumButtons(num);
}

window.handleCustomInput = function(val) {
    let num = parseInt(val);
    if (isNaN(num) || num < 1) num = 1;
    if (num > totalAvailableQuestions) num = totalAvailableQuestions;
    totalConfigured = num;
    updateNumButtons(num);
}

function updateNumButtons(num) {
    const buttons = document.querySelectorAll('#numSelectGrid button');
    buttons.forEach(btn => {
        const btnVal = btn.getAttribute('data-val');
        if(btnVal == num || (btnVal === 'all' && num === totalAvailableQuestions)) {
            btn.className = "py-2.5 rounded-xl text-sm font-bold border-2 border-indigo-500 bg-indigo-50 text-indigo-700 btn-press option-btn transform scale-105 shadow-md";
        } else {
            btn.className = "py-2.5 rounded-xl text-sm font-bold border border-gray-200 hover:border-indigo-300 text-gray-600 btn-press option-btn hover:bg-gray-50";
        }
    });
}

// THUẬT TOÁN TRỘN ĐỀ CÂN BẰNG (ROUND-ROBIN)
function startQuiz() {
    let num = parseInt(document.getElementById('customNumInput').value) || totalConfigured;
    if(num < 1) num = 10;
    if(num > totalAvailableQuestions) num = totalAvailableQuestions;
    totalConfigured = num;

    let kPool = shuffleArray([...allBanks.kQs]);
    let vPool = shuffleArray([...allBanks.vQs]);
    let gPool = shuffleArray([...allBanks.gQs]);
    
    let selected = [];
    let turn = 0; // 0:Grammar, 1:Kanji, 2:Vocab

    while(selected.length < totalConfigured) {
        let added = false;
        if (turn === 0) { if (gPool.length > 0) { selected.push(gPool.pop()); added = true; } turn = 1; }
        else if (turn === 1) { if (kPool.length > 0) { selected.push(kPool.pop()); added = true; } turn = 2; }
        else if (turn === 2) { if (vPool.length > 0) { selected.push(vPool.pop()); added = true; } turn = 0; }
        
        if (gPool.length === 0 && kPool.length === 0 && vPool.length === 0) break;
    }

    currentQuestions = shuffleArray(selected); // Trộn lần cuối
    currentIndex = 0;
    userAnswers = new Array(totalConfigured).fill(null);
    stats = { correct: 0, incorrect: 0, skipped: 0 };
    renderQuizScreen();
}

    let explanationHTML = '';

            <!-- Progress Info -->

                        <span class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div> ${stats.correct}</span>

}

window.selectAnswer = function(idx) {
    if (userAnswers[currentIndex] !== null) return; 

    const q = currentQuestions[currentIndex];
    const isCorrect = q.opts[idx] === q.ans;
    
    userAnswers[currentIndex] = { selectedIdx: idx, isCorrect: isCorrect };
    if (isCorrect) stats.correct++;
    else stats.incorrect++;

    renderQuizScreen(); 
}

window.skipQuestion = function() {
    userAnswers[currentIndex] = { selectedIdx: -1, isCorrect: false };
    stats.skipped++;
    renderQuizScreen();
}

window.nextQuestion = function() {
    if (currentIndex < totalConfigured - 1) {
        currentIndex++;
        renderQuizScreen();
    } else {
        endQuiz();
    }
}

window.prevQuestion = function() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuizScreen();
    }
}

window.playTTS = function(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
    } else {
        alert("Trình duyệt không hỗ trợ phát âm.");
    }
}

// --- SCREEN 3: KẾT QUẢ ---
window.endQuiz = function() {
    let c = 0, ic = 0, sk = 0;
    userAnswers.forEach(ans => {

            sk++;

    let accuracy = (c + ic) > 0 ? Math.round((c / (c + ic)) * 100) : 0;

            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-4 mb-10">
                <button onclick="renderStartScreen()" class="w-full sm:w-56 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-black py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 btn-press flex justify-center items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> Thử sức lại
                </button>
                <button onclick="renderStartScreen()" class="w-full sm:w-56 bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 font-black py-4 px-6 rounded-2xl shadow-sm transition-all btn-press hover-lift flex justify-center items-center gap-2">
                    <i class="fa-solid fa-house"></i> Trang chủ
                </button>
            </div>

            ${c + ic + sk > 0 ? `
            <div class="mt-12 border-t border-gray-200 pt-10">
                <h3 class="text-xl font-black text-gray-800 mb-6 flex items-center justify-center gap-3">
                    <span class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center shadow-sm"><i class="fa-solid fa-list-check"></i></span>
                    Xem lại chi tiết đáp án
                </h3>
                <div class="max-h-[500px] overflow-y-auto pr-3 scroll-smooth">
                    ${reviewHTML}
                </div>
            </div>
            ` : ''}
        </div>
    `;
}

renderStartScreen();
</script>
</body>
</html>
